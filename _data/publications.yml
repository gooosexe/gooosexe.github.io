index:
- {name: 'nbodysim', url: 'https://github.com/gooosexe/nbodysim', description: 'A simple n-body simulation written in Python using matplotlib. Contains both direct method and Barnes-Hut method of calculating forces. Working on implementing perfectly inelastic collisions and merging bodies.'}
- {name: 'boids', url: 'https://github.com/gooosexe/boids', description: 'A simple Java program that simulates the flocking behaviour of birds.'}
- {name: 'nanobrowser', url: 'https://github.com/gooosexe/nanobrowser', description: 'A super light and mostly experimental browser built with Java Swing. It is a simple browser that can render HTML and CSS, but does not support JavaScript.'}
- {name: 'spot2mp3', url: 'https://github.com/gooosexe/spot2mp3', description: 'Scrapes Spotify playlists and converts all songs to mp3 files by matching the song on youtube and downloading the audio. Uses spotipy to scrape from spotipy, pytube to download from youtube and ffmpeg to convert to mp3 and write metadata.'}