---
layout: default
---

{{ content }}

<div class="row g-5 mb-5">
  <div>
    <h3 class="fw-bold border-bottom pb-3 mb-5">blog</h3>
    <div class="row g-5 mb-5">
      <div class="col-md-10">
        {% for post in site.posts %}
      	<h4><b><a href="{{ site.github.url }}{{ post.url }}">{{ post.title }}</b></a> - {{ post.date | date: "%B %-d, %Y" }}</h4>
    	  {% endfor %}
      </div>
    </div>
  </div>
</div>
